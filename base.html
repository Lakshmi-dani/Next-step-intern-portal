<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}NextStep Intern Portal{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-brand">
      <i class="fa-solid fa-arrow-up-right-dots"></i>
      <span>NextStep</span>
    </div>
    <ul class="nav-links">
      <li><a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">
        <i class="fa-solid fa-gauge"></i> Dashboard
      </a></li>
      <li><a href="{{ url_for('interns_list') }}" class="{% if request.endpoint in ['interns_list','intern_detail'] %}active{% endif %}">
        <i class="fa-solid fa-users"></i> Interns
      </a></li>
      <li><a href="{{ url_for('tasks_list') }}" class="{% if request.endpoint == 'tasks_list' %}active{% endif %}">
        <i class="fa-solid fa-list-check"></i> Tasks
      </a></li>
      <li><a href="{{ url_for('announcements_list') }}" class="{% if request.endpoint == 'announcements_list' %}active{% endif %}">
        <i class="fa-solid fa-bullhorn"></i> Announcements
      </a></li>
    </ul>
  </nav>

  <div class="main-content">
    <header class="top-bar">
      <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
      <div class="top-bar-right">
        <span class="badge-date"><i class="fa-regular fa-calendar"></i> Summer 2026</span>
      </div>
    </header>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
